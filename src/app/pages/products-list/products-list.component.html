<div style="margin-top: 25px" class="mat-elevation-z8">
  <button [routerLink]="['/products-detail',]" style="background-color: #36bd63;"  mat-raised-button color="primary">Add Producto</button>

  <table mat-table [dataSource]="(products$ | async) || []">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef><b>ID</b></th>
      <td mat-cell *matCellDef="let product">{{ product.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef><b>Product name</b></th>
      <td mat-cell *matCellDef="let product">
        {{ product.name }}
      </td>
    </ng-container>

    <ng-container matColumnDef="cost">
      <th mat-header-cell *matHeaderCellDef><b>Cost</b></th>
      <td mat-cell *matCellDef="let product">{{ product.cost  }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef><b>Description</b></th>
      <td mat-cell *matCellDef="let product">{{ product.description }}</td>
    </ng-container>

    <ng-container matColumnDef="detail">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let product">
          <button [routerLink]="['/products-detail', product.id]" style="background-color: #f3edf1;"  mat-raised-button color="primary">See Detail Info</button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
